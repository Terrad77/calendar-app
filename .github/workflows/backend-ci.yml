name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint ${{ matrix.package }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package: [frontend, backend]
        node-version: [20.x]

    defaults:
      run:
        working-directory: ${{ matrix.package }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    name: Build Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        node-version: [20.x]

    env:
      DATABASE_URL: postgres://calendar:calendar@localhost:5432/calendar
      JWT_SECRET: calendar-secret
      JWT_REFRESH_SECRET: calendar-refresh-secret
      GOOGLE_CLIENT_ID: calendar-client-id
      GOOGLE_CLIENT_SECRET: calendar-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3001/api/auth/google/callback
      GOOGLE_AI_API_KEY: calendar-ai-api-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: backend

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    env:
      DATABASE_URL: postgres://calendar:calendar@localhost:5432/calendar
      JWT_SECRET: calendar-secret
      JWT_REFRESH_SECRET: calendar-refresh-secret
      GOOGLE_CLIENT_ID: calendar-client-id
      GOOGLE_CLIENT_SECRET: calendar-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3001/api/auth/google/callback
      GOOGLE_AI_API_KEY: calendar-ai-api-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run tests
        run: NODE_ENV=test npm run test
